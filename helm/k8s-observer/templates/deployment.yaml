apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-observer
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: k8s-observer
  template:
    metadata:
      labels:
        app: k8s-observer
    spec:
      serviceAccountName: k8s-observer
      containers:
        - name: k8s-observer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LLM_SUMMARY_MODE
              value: {{ .Values.llm.summaryMode | quote }}
            - name: LLM_FAIL_OPEN
              value: {{ .Values.llm.failOpen | quote }}
            - name: LOCAL_LLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            - name: LOCAL_LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            - name: LOCAL_LLM_TIMEOUT_SECONDS
              value: {{ .Values.llm.timeoutSeconds | quote }}
            {{- if .Values.llm.healthPath }}
            - name: LOCAL_LLM_HEALTH_PATH
              value: {{ .Values.llm.healthPath | quote }}
            {{- end }}
            - name: SUMMARY_CACHE_ENABLED
              value: {{ .Values.cache.enabled | quote }}
            - name: SUMMARY_CACHE_TTL_SECONDS
              value: {{ .Values.cache.ttlSeconds | quote }}
            - name: SUMMARY_CACHE_STALE_SECONDS
              value: {{ .Values.cache.staleSeconds | quote }}
            - name: SUMMARY_CACHE_MAX_ENTRIES
              value: {{ .Values.cache.maxEntries | quote }}
            - name: SUMMARY_PREFETCH_ENABLED
              value: {{ .Values.cache.prefetchEnabled | quote }}
            - name: SUMMARY_PREFETCH_NAMESPACES
              value: {{ .Values.cache.prefetchNamespaces | quote }}
            - name: SUMMARY_PREFETCH_INTERVAL_SECONDS
              value: {{ .Values.cache.prefetchIntervalSeconds | quote }}
            - name: LLM_SUMMARY_CACHE_ENABLED
              value: {{ .Values.llmSummaryCache.enabled | quote }}
            - name: LLM_SUMMARY_CACHE_TTL_SECONDS
              value: {{ .Values.llmSummaryCache.ttlSeconds | quote }}
            - name: LLM_SUMMARY_CACHE_MAX_ENTRIES
              value: {{ .Values.llmSummaryCache.maxEntries | quote }}
          ports:
            - containerPort: 8080
          command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8080"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
